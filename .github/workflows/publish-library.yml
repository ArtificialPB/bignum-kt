name: Deploy SNAPSHOT and new releases to Maven Central

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

  workflow_dispatch:

concurrency:
  group: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'snapshot' }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  deploy:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - uses: ./.github/actions/environment-setup

      - name: Build project
        run: ./gradlew clean build --no-configuration-cache --no-watch-fs --stacktrace

      - name: Publish artifacts to staging
        run: ./gradlew publish --no-configuration-cache --no-watch-fs --stacktrace

      - name: Deploy to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
        run: ./gradlew jreleaserDeploy --no-configuration-cache --no-watch-fs --stacktrace
